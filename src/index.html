<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>YouTube Channel Analyzer - Phân tích kênh YouTube</title>
  <meta name="description" content="Tool phân tích sơ bộ kênh YouTube: chủ đề viral, title formulas, chân dung người xem">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="./style.css">
</head>
<body>
  <div id="app">
    <!-- Input Page -->
    <div id="input-page" class="page active">
      <div class="input-container">
        <div class="logo-section">
          <div class="logo-icon">
            <svg width="48" height="48" viewBox="0 0 24 24" fill="none">
              <rect width="24" height="24" rx="6" fill="#FF0000"/>
              <path d="M10 8.5v7l6-3.5-6-3.5z" fill="white"/>
            </svg>
          </div>
          <h1>YouTube Channel Analyzer</h1>
          <p class="subtitle">Phân tích sơ bộ kênh YouTube bất kỳ - chủ đề viral, title formulas, chân dung người xem</p>
        </div>

        <div class="search-box">
          <div class="input-wrapper">
            <span class="input-prefix">@</span>
            <input type="text" id="channel-input" placeholder="Nhập handle kênh (vd: duythanhish)" autocomplete="off" spellcheck="false">
          </div>
          <button id="analyze-btn" class="btn-primary">
            <span class="btn-text">Phân tích kênh</span>
            <span class="btn-loading" style="display:none">
              <span class="spinner"></span> Đang phân tích...
            </span>
          </button>
        </div>

        <div id="error-msg" class="error-msg" style="display:none"></div>

        <div id="history-section" class="history-section" style="display:none">
          <h3>Kênh đã phân tích</h3>
          <div id="history-list" class="history-list"></div>
        </div>

        <!-- Settings -->
        <div class="settings-section">
          <button id="settings-toggle" class="settings-toggle">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12.22 2h-.44a2 2 0 0 0-2 2v.18a2 2 0 0 1-1 1.73l-.43.25a2 2 0 0 1-2 0l-.15-.08a2 2 0 0 0-2.73.73l-.22.38a2 2 0 0 0 .73 2.73l.15.1a2 2 0 0 1 1 1.72v.51a2 2 0 0 1-1 1.74l-.15.09a2 2 0 0 0-.73 2.73l.22.38a2 2 0 0 0 2.73.73l.15-.08a2 2 0 0 1 2 0l.43.25a2 2 0 0 1 1 1.73V20a2 2 0 0 0 2 2h.44a2 2 0 0 0 2-2v-.18a2 2 0 0 1 1-1.73l.43-.25a2 2 0 0 1 2 0l.15.08a2 2 0 0 0 2.73-.73l.22-.39a2 2 0 0 0-.73-2.73l-.15-.08a2 2 0 0 1-1-1.74v-.5a2 2 0 0 1 1-1.74l.15-.09a2 2 0 0 0 .73-2.73l-.22-.38a2 2 0 0 0-2.73-.73l-.15.08a2 2 0 0 1-2 0l-.43-.25a2 2 0 0 1-1-1.73V4a2 2 0 0 0-2-2z"/><circle cx="12" cy="12" r="3"/></svg>
            Cài đặt API Keys
          </button>
          <div id="settings-panel" class="settings-panel" style="display:none">
            <div class="field">
              <label>YouTube Data API Key <span class="required">*</span></label>
              <input type="password" id="yt-key-input" placeholder="AIza...">
              <small>Bắt buộc. Lấy tại <a href="https://console.cloud.google.com/apis/credentials" target="_blank">Google Cloud Console</a></small>
            </div>
            <div class="field">
              <label>Gemini API Key <span class="optional">(tùy chọn)</span></label>
              <input type="password" id="gemini-key-input" placeholder="AIza...">
              <small>Cho phân tích AI. Lấy tại <a href="https://aistudio.google.com/apikey" target="_blank">AI Studio</a></small>
            </div>
            <button id="save-keys-btn" class="btn-secondary">Lưu API Keys</button>
          </div>
        </div>
      </div>

      <a href="https://zalo.me/g/igkywu632" target="_blank" class="author-brand">Minh Đỗ</a>
    </div>

    <!-- Result Page -->
    <div id="result-page" class="page">
      <div class="result-container">
        <!-- Header -->
        <div class="result-header">
          <button id="back-btn" class="btn-back">← Phân tích kênh khác</button>
          <div class="channel-info">
            <img id="channel-avatar" class="channel-avatar" src="" alt="">
            <h1 id="channel-name" class="channel-name"></h1>
            <a id="channel-link" class="channel-link" href="" target="_blank"></a>
            <div class="analysis-meta">
              <span id="analysis-date"></span>
              <span id="analysis-time"></span>
            </div>
          </div>
        </div>

        <!-- Stat Cards -->
        <div class="stat-cards" id="stat-cards"></div>

        <!-- Tabs -->
        <div class="tabs-nav" id="tabs-nav">
          <button class="tab-btn active" data-tab="overview">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg>
            Tổng Quan
          </button>
          <button class="tab-btn" data-tab="insights">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M12 16v-4M12 8h.01"/></svg>
            AI Insights
          </button>
          <button class="tab-btn" data-tab="formulas">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 4h16v16H4z"/><path d="M9 9h6M9 13h4"/></svg>
            Formulas
          </button>
          <button class="tab-btn" data-tab="patterns">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>
            Patterns
          </button>
          <button class="tab-btn" data-tab="allvideos">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg>
            <span>Tất Cả (<span id="total-count">0</span>)</span>
          </button>
        </div>

        <!-- Tab Content -->
        <div class="tab-content">
          <div id="tab-overview" class="tab-pane active"></div>
          <div id="tab-insights" class="tab-pane"></div>
          <div id="tab-formulas" class="tab-pane"></div>
          <div id="tab-patterns" class="tab-pane"></div>
          <div id="tab-allvideos" class="tab-pane"></div>
        </div>
      </div>

      <a href="https://zalo.me/g/igkywu632" target="_blank" class="author-brand result-author">Minh Đỗ</a>
    </div>
  </div>

  <button id="scroll-top-btn" class="scroll-top-btn" style="display:none" title="Lên đầu trang">
    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="18 15 12 9 6 15"/></svg>
  </button>

  <script type="module" src="./main.js"></script>
</body>
</html>
